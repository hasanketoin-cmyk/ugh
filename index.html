<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة خطوط باصات النادي الصيفي</title>

<style>

body{
font-family:Tahoma,sans-serif;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:8px 12px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{
background:#27ae60;
color:white;
}

.bulk{
background:#3498db;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

.toggle{
background:#f39c12;
color:white;
}

.bus{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.present{
background:#2ecc71;
color:white;
font-weight:bold;
}

.absent{
background:#e74c3c;
color:white;
font-weight:bold;
}

.stats{
margin-top:10px;
padding:10px;
background:#ecf0f1;
border-radius:6px;
font-weight:bold;
}

textarea{
width:100%;
height:200px;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:500px;
max-width:95%;
padding:20px;
border-radius:10px;
}

</style>
</head>
<body>

<h1>🚌 إدارة خطوط باصات النادي الصيفي</h1>

<div class="card">

<input
type="text"
id="busName"
placeholder="اسم خط الباص">

<input
type="text"
id="supervisorName"
placeholder="اسم المشرف">

<button
class="add"
onclick="addBus()">

➕ إضافة خط

</button>

</div>

<div id="allBusesContainer"></div>

<div class="modal" id="bulkModal">

<div class="modal-content">

<h3>📋 إضافة مجموعة أطفال</h3>

<textarea
id="bulkNames"
placeholder="كل اسم في سطر"></textarea>

<br><br>

<button
class="add"
onclick="saveBulkNames()">

حفظ الأسماء

</button>

<button
class="delete"
onclick="closeBulkModal()">

إلغاء

</button>

</div>

</div>

<script>

let buses=[];
let currentBusId=null;

function addBus(){

const name=document.getElementById("busName").value.trim();
const supervisor=document.getElementById("supervisorName").value.trim();

if(!name){
alert("أدخل اسم الخط");
return;
}

buses.push({
id:Date.now(),
name:name,
supervisor:supervisor,
children:[]
});

document.getElementById("busName").value="";
document.getElementById("supervisorName").value="";

render();

}

function deleteBus(busId){

if(confirm("هل تريد حذف الخط بالكامل؟")){

buses=buses.filter(bus=>bus.id!==busId);

render();

}

}

function addChild(busId){

const childName=prompt("اسم الطفل");

if(!childName) return;

const bus=buses.find(b=>b.id===busId);

bus.children.push({
id:Date.now()+Math.random(),
name:childName,
present:false
});

render();

}

function deleteChild(busId,childId){

const bus=buses.find(b=>b.id===busId);

bus.children=bus.children.filter(
child=>child.id!==childId
);

render();

}

function toggleAttendance(busId,childId){

const bus=buses.find(b=>b.id===busId);

const child=bus.children.find(
c=>c.id===childId
);

child.present=!child.present;

render();

}

function openBulkModal(busId){

currentBusId=busId;

document.getElementById("bulkNames").value="";

document.getElementById("bulkModal").style.display="flex";

}

function closeBulkModal(){

document.getElementById("bulkModal").style.display="none";

}

function saveBulkNames(){

const namesText=
document.getElementById("bulkNames").value;

if(!namesText) return;

const bus=buses.find(
b=>b.id===currentBusId
);

const names=namesText
.split("\n")
.map(name=>name.trim())
.filter(name=>name!="");

names.forEach(name=>{

bus.children.push({
id:Date.now()+Math.random(),
name:name,
present:false
});

});

closeBulkModal();

render();

}

function render(){

const container=
document.getElementById("allBusesContainer");

container.innerHTML="";

buses.forEach(bus=>{

const total=bus.children.length;

const present=
bus.children.filter(c=>c.present).length;

const absent=total-present;

container.innerHTML+=`

<div class="bus">

<h2>🚌 ${bus.name}</h2>

<p>
👨‍✈️ المشرف:
<b>${bus.supervisor || "-"}</b>
</p>

<button
class="add"
onclick="addChild(${bus.id})">

➕ طفل

</button>

<button
class="bulk"
onclick="openBulkModal(${bus.id})">

📋 مجموعة أطفال

</button>

<button
class="delete"
onclick="deleteBus(${bus.id})">

🗑 حذف الخط

</button>

<div class="stats">

👦 العدد الكلي: ${total}
&nbsp;&nbsp;|&nbsp;&nbsp;

🟢 الحاضرون: ${present}
&nbsp;&nbsp;|&nbsp;&nbsp;

🔴 الغائبون: ${absent}

</div>

<table>

<tr>

<th>#</th>
<th>اسم الطفل</th>
<th>الحالة</th>
<th>الإجراءات</th>

</tr>

${bus.children.map((child,index)=>`

<tr>

<td>${index+1}</td>

<td>${child.name}</td>

<td class="${
child.present
? 'present'
: 'absent'
}">

${
child.present
? 'حاضر'
: 'غائب'
}

</td>

<td>

<button
class="toggle"
onclick="toggleAttendance(${bus.id},${child.id})">

تغيير

</button>

<button
class="delete"
onclick="deleteChild(${bus.id},${child.id})">

حذف

</button>

</td>

</tr>

`).join('')}

</table>

</div>

`;

});

}

</script>

</body>
</html>
