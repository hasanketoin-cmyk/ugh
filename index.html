<!DOCTYPE html>
<html dir="rtl">

<head>

<meta charset="UTF-8">

<title>تفقد الباصات</title>

<style>

body{
font-family:Tahoma;
background:#f3f4f6;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#f8fafc;
}

.present{
background:#22c55e;
color:white;
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.absent{
background:#ef4444;
color:white;
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

select{
padding:10px;
width:300px;
}

.stat{
display:inline-block;
background:white;
padding:15px;
margin:10px;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>
🚌 تفقد الباصات
</h2>
