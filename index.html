<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
🚌 إدارة خطوط باصات النادي الصيفي
</title>

<style>

body{
font-family:Tahoma,sans-serif;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:8px 12px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{
background:#27ae60;
color:white;
}

.bulk{
background:#3498db;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

.toggle{
background:#f39c12;
color:white;
}

.bus{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.present{
background:#2ecc71;
color:white;
font-weight:bold;
}

.absent{
background:#e74c3c;
color:white;
font-weight:bold;
}

.stats{
margin-top:10px;
padding:10px;
background:#ecf0f1;
border-radius:6px;
font-weight:bold;
}

textarea{
width:100%;
height:200px;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:500px;
max-width:95%;
padding:20px;
border-radius:10px;
}

.dashboard{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
font-size:18px;
font-weight:bold;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>
🚌 إدارة خطوط باصات النادي الصيفي
</h1>

<div class="dashboard">

📊 إجمالي الأطفال:
<span id="totalChildren">0</span>

|

🟢 الحاضرون:
<span id="totalPresent">0</span>

|

🔴 الغائبون:
<span id="totalAbsent">0</span>

</div>

<div class="card">

<input
type="text"
id="searchInput"
placeholder="🔍 البحث عن طفل">

<br>

<input
type="text"
id="busName"
placeholder="اسم خط الباص">

<input
type="text"
id="supervisorName"
placeholder="اسم المشرف">

<button
class="add"
onclick="addBus()">

➕ إضافة خط

</button>

<button
class="bulk"
onclick="exportExcel()">

📊 Excel

</button>

<button
class="bulk"
onclick="exportPDF()">

📄 PDF

</button>

</div>

<div id="allBusesContainer"></div>

<div class="modal" id="bulkModal">

<div class="modal-content">

<h3>
📋 إضافة مجموعة أطفال
</h3>

<textarea
id="bulkNames"
placeholder="كل اسم في سطر"></textarea>

<br><br>

<button
class="add"
onclick="saveBulkNames()">

حفظ الأسماء

</button>

<button
class="delete"
onclick="closeBulkModal()">

إلغاء

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA-aV5qGj27Vj0e8dtrXkz9Ckt5Tp-reyY",

authDomain:
"score-summer-camp.firebaseapp.com",

projectId:
"score-summer-camp",

storageBucket:
"score-summer-camp.firebasestorage.app",

messagingSenderId:
"836117896870",

appId:
"1:836117896870:web:730a652b3a8ab015105e67"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let buses=[];
let currentBusId=null;
  async function loadBuses(){

buses=[];

const busesSnapshot=
await getDocs(
collection(db,"buses")
);

for(const busDoc of busesSnapshot.docs){

const busData=busDoc.data();

const children=[];

const childrenSnapshot=
await getDocs(
collection(
db,
"buses",
busDoc.id,
"children"
)
);

childrenSnapshot.forEach(childDoc=>{

children.push({
id:childDoc.id,
...childDoc.data()
});

});

buses.push({
id:busDoc.id,
name:busData.name,
supervisor:busData.supervisor,
children:children
});

}

render();

}

async function addBus(){

const name=
document.getElementById("busName")
.value
.trim();

const supervisor=
document.getElementById("supervisorName")
.value
.trim();

if(!name){

alert("أدخل اسم خط الباص");

return;

}

await addDoc(
collection(db,"buses"),
{
name:name,
supervisor:supervisor,
createdAt:new Date()
}
);

document.getElementById("busName").value="";
document.getElementById("supervisorName").value="";

loadBuses();

}

async function deleteBus(busId){

if(
!confirm(
"هل تريد حذف خط الباص؟"
)
){
return;
}

await deleteDoc(
doc(
db,
"buses",
busId
)
);

loadBuses();

}

async function addChild(busId){

const childName=
prompt("اسم الطفل");

if(!childName) return;

await addDoc(
collection(
db,
"buses",
busId,
"children"
),
{
name:childName,
present:false,
attendanceDate:"",
createdAt:new Date()
}
);

loadBuses();

}

async function deleteChild(
busId,
childId
){

await deleteDoc(
doc(
db,
"buses",
busId,
"children",
childId
)
);

loadBuses();

}

async function toggleAttendance(
busId,
childId
){

const childRef=
doc(
db,
"buses",
busId,
"children",
childId
);

const childSnap=
await getDoc(
childRef
);

const current=
childSnap.data();

await updateDoc(
childRef,
{
present:!current.present,
attendanceDate:
new Date()
.toISOString()
.slice(0,10)
}
);

loadBuses();

}

function openBulkModal(
busId
){

currentBusId=busId;

document
.getElementById(
"bulkNames"
)
.value="";

document
.getElementById(
"bulkModal"
)
.style.display="flex";

}

function closeBulkModal(){

document
.getElementById(
"bulkModal"
)
.style.display="none";

}

async function saveBulkNames(){

const namesText=
document
.getElementById(
"bulkNames"
)
.value;

if(!namesText)
return;

const names=
namesText
.split("\n")
.map(
name=>name.trim()
)
.filter(
name=>name!=""
);

for(const name of names){

await addDoc(
collection(
db,
"buses",
currentBusId,
"children"
),
{
name:name,
present:false,
attendanceDate:"",
createdAt:new Date()
}
);

}

closeBulkModal();

loadBuses();

}
  function updateDashboard(){

let totalChildren=0;
let totalPresent=0;

buses.forEach(bus=>{

totalChildren+=bus.children.length;

totalPresent+=
bus.children.filter(
c=>c.present
).length;

});

const totalAbsent=
totalChildren-totalPresent;

document.getElementById(
"totalChildren"
).innerText=totalChildren;

document.getElementById(
"totalPresent"
).innerText=totalPresent;

document.getElementById(
"totalAbsent"
).innerText=totalAbsent;

}

function render(){

updateDashboard();

const container=
document.getElementById(
"allBusesContainer"
);

const search=
document.getElementById(
"searchInput"
)?.value
?.toLowerCase() || "";

container.innerHTML="";

buses.forEach(bus=>{

const filteredChildren=
bus.children.filter(child=>
child.name
.toLowerCase()
.includes(search)
);

const total=
bus.children.length;

const present=
bus.children.filter(
c=>c.present
).length;

const absent=
total-present;

container.innerHTML+=`

<div class="bus">

<h2>
🚌 ${bus.name}
</h2>

<p>

👨‍✈️ المشرف:

<b>
${bus.supervisor || "-"}
</b>

</p>

<button
class="add"
onclick="addChild('${bus.id}')">

➕ طفل

</button>

<button
class="bulk"
onclick="openBulkModal('${bus.id}')">

📋 مجموعة أطفال

</button>

<button
class="delete"
onclick="deleteBus('${bus.id}')">

🗑 حذف الخط

</button>

<div class="stats">

👦 العدد الكلي:
${total}

&nbsp;&nbsp;|

&nbsp;&nbsp;

🟢 الحاضرون:
${present}

&nbsp;&nbsp;|

&nbsp;&nbsp;

🔴 الغائبون:
${absent}

</div>

<table>

<tr>

<th>#</th>

<th>
اسم الطفل
</th>

<th>
الحالة
</th>

<th>
الإجراءات
</th>

</tr>

${filteredChildren.map((child,index)=>`

<tr>

<td>
${index+1}
</td>

<td>
${child.name}
</td>

<td
class="${
child.present
?
'present'
:
'absent'
}">

${
child.present
?
'حاضر'
:
'غائب'
}

</td>

<td>

<button
class="toggle"
onclick="toggleAttendance(
'${bus.id}',
'${child.id}'
)">

تغيير

</button>

<button
class="delete"
onclick="deleteChild(
'${bus.id}',
'${child.id}'
)">

حذف

</button>

</td>

</tr>

`).join("")}

</table>

</div>

`;

});

}
  document
.getElementById("searchInput")
.addEventListener(
"keyup",
render
);
  function exportExcel(){

const rows=[];

buses.forEach(bus=>{

bus.children.forEach(child=>{

rows.push({

"خط الباص":bus.name,
"المشرف":bus.supervisor,
"اسم الطفل":child.name,
"الحالة":
child.present
?
"حاضر"
:
"غائب",

"آخر تفقد":
child.attendanceDate || ""

});

});

});

const worksheet=
XLSX.utils.json_to_sheet(rows);

const workbook=
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
workbook,
worksheet,
"Attendance"
);

XLSX.writeFile(
workbook,
"summer-camp-attendance.xlsx"
);

}

async function exportPDF(){

const { jsPDF } = window.jspdf;

const pdf =
new jsPDF();

let y=20;

pdf.setFontSize(16);

pdf.text(
"Summer Camp Attendance",
20,
10
);

buses.forEach(bus=>{

pdf.setFontSize(12);

pdf.text(
`Bus: ${bus.name}`,
10,
y
);

y+=8;

bus.children.forEach(child=>{

pdf.text(

`${child.name} - ${
child.present
?
"Present"
:
"Absent"
}`,

15,
y

);

y+=7;

if(y>270){

pdf.addPage();

y=20;

}

});

y+=10;

});

pdf.save(
"attendance-report.pdf"
);

}

function dailyReport(){

const today=
new Date()
.toISOString()
.slice(0,10);

let total=0;
let present=0;

buses.forEach(bus=>{

bus.children.forEach(child=>{

if(
child.attendanceDate===today
){

total++;

if(child.present){

present++;

}

}

});

});

const absent=
total-present;

alert(

`تقرير اليوم

إجمالي التفقد:
${total}

الحاضرون:
${present}

الغائبون:
${absent}`

);

}

function monthlyReport(){

const currentMonth=
new Date()
.toISOString()
.slice(0,7);

let total=0;
let present=0;

buses.forEach(bus=>{

bus.children.forEach(child=>{

if(
child.attendanceDate &&
child.attendanceDate.startsWith(
currentMonth
)
){

total++;

if(child.present){

present++;

}

}

});

});

const absent=
total-present;

alert(

`التقرير الشهري

إجمالي السجلات:
${total}

الحاضرون:
${present}

الغائبون:
${absent}`

);

}

window.onload=async()=>{

await loadBuses();

};
  </script>

</body>
</html>
