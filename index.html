<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة خطوط باصات النادي الصيفي</title>

<style>

body{
font-family:Tahoma;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
}

.add{
background:#27ae60;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

.bus{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.present{
background:#2ecc71;
color:white;
}

.absent{
background:#e74c3c;
color:white;
}

.stats{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🚌 إدارة خطوط الباصات</h1>

<div class="card">

<input id="busName" placeholder="اسم خط الباص">

<input id="supervisorName" placeholder="اسم المشرف">

<button class="add" onclick="addBus()">
➕ إضافة خط
</button>

</div>

<div id="busesContainer"></div>

<script>

let buses=[];

function addBus(){

const busName=document.getElementById("busName").value;
const supervisor=document.getElementById("supervisorName").value;

if(!busName) return;

buses.push({
id:Date.now(),
name:busName,
supervisor:supervisor,
children:[]
});

document.getElementById("busName").value="";
document.getElementById("supervisorName").value="";

render();

}

function addChild(busId){

const childName=prompt("اسم الطفل");

if(!childName) return;

const bus=buses.find(b=>b.id===busId);

bus.children.push({
id:Date.now(),
name:childName,
present:false
});

render();

}

function deleteChild(busId,childId){

const bus=buses.find(b=>b.id===busId);

bus.children=bus.children.filter(c=>c.id!==childId);

render();

}

function toggleAttendance(busId,childId){

const bus=buses.find(b=>b.id===busId);

const child=bus.children.find(c=>c.id===childId);

child.present=!child.present;

render();

}

function deleteBus(busId){

if(confirm("حذف الخط؟")){

buses=buses.filter(b=>b.id!==busId);

render();

}

}

function render(){

const container=document.getElementById("busesContainer");

container.innerHTML="";

buses.forEach(bus=>{

const total=bus.children.length;

const present=bus.children.filter(c=>c.present).length;

const absent=total-present;

container.innerHTML+=`

<div class="bus">

<h2>
🚌 ${bus.name}
</h2>

<p>
👨‍✈️ المشرف:
<b>${bus.supervisor}</b>
</p>

<button class="add"
onclick="addChild(${bus.id})">

➕ إضافة طفل

</button>

<button class="delete"
onclick="deleteBus(${bus.id})">

🗑 حذف الخط

</button>

<div class="stats">

العدد الكلي: ${total}
|
الحاضرين: ${present}
|
الغائبين: ${absent}

</div>

<table>

<tr>
<th>#</th>
<th>اسم الطفل</th>
<th>الحالة</th>
<th>الإجراء</th>
</tr>

${bus.children.map((child,index)=>`

<tr>

<td>${index+1}</td>

<td>${child.name}</td>

<td class="${child.present?'present':'absent'}">

${child.present?'حاضر':'غائب'}

</td>

<td>

<button
onclick="toggleAttendance(${bus.id},${child.id})">

تغيير الحالة

</button>

<button
class="delete"
onclick="deleteChild(${bus.id},${child.id})">

حذف

</button>

</td>

</tr>

`).join('')}

</table>

</div>

`;

});

}

</script>

</body>

</html>
