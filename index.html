<div class="card">


<h1 class="mainTitle">

🚌 إدارة خطوط باصات النادي الصيفي Score

</h1>


<input
type="text"
id="busName"
placeholder="اسم خط الباص">

<button
onclick="addBus()">

➕ إضافة خط

</button>

</div>

<div id="allBusesContainer"></div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA-aV5qGj27Vj0e8dtrXkz9Ckt5Tp-reyY",
authDomain: "score-summer-camp.firebaseapp.com",
projectId: "score-summer-camp",
storageBucket: "score-summer-camp.firebasestorage.app",
messagingSenderId: "836117896870",
appId: "1:836117896870:web:730a652b3a8ab015105e67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const busesCollection = collection(db,"buses");
const busChildrenCollection = collection(db,"busChildren");

let buses = [];
let children = [];

window.addBus = async function(){

const name =
document.getElementById("busName").value.trim();

if(!name) return;

const supervisor =
prompt("اسم المشرف");

await addDoc(
busesCollection,
{
name:name,
supervisor: supervisor || ""
}
);
document.getElementById("busName").value = "";

};

window.addChildToBus = async function(busName){

const childName = prompt("اسم الطفل");

if(!childName) return;

await addDoc(
busChildrenCollection,
{
name: childName,
busLine: busName,
attendance: false
}
);

};

window.toggleAttendance = async function(docId){

const child =
children.find(c => c.docId === docId);

if(!child) return;

await updateDoc(
doc(db,"busChildren",docId),
{
attendance: !child.attendance
}
);

};

window.editSupervisor =
async function(docId){

const bus =
buses.find(
b => b.docId === docId
);

if(!bus) return;

const newName =
prompt(
"اسم المشرف الجديد",
bus.supervisor || ""
);

if(newName === null)
return;

await updateDoc(
doc(
db,
"buses",
docId
),
{
supervisor:
newName.trim()
}
);

};
window.deleteChild =
async function(docId){

if(!confirm("حذف الطفل؟"))
return;

await deleteDoc(
doc(
db,
"busChildren",
docId
)
);

};


function renderAllBuses(){

let html = "";

buses.forEach(bus=>{

const kids =
children.filter(
c => c.busLine === bus.name
);

html += `

<div class="card">

<h2>🚌 ${bus.name}</h2>

<p>
👨‍✈️ المشرف:
<b>${bus.supervisor || "-"}</b>

<button
onclick="editSupervisor('${bus.docId}')">

✏️ تعديل

</button>

</p>

<button
class="present"
onclick="addChildToBus('${bus.name}')">
➕ إضافة طفل
</button>

<table>

<tr>
<th>الاسم</th>
<th>الحالة</th>
<th>تفقد</th>
<th>حذف</th>
</tr>


kids.forEach(child=>{

html += `

<tr>

<td>${child.name}</td>

<td>
${child.attendance ? "🟢 حاضر" : "🔴 غائب"}
</td>

<td>

<button
class="${child.attendance ? 'present' : 'absent'}"
onclick="toggleAttendance('${child.docId}')">

${child.attendance ? 'حاضر' : 'غائب'}

</button>

</td>

<td>

<button
class="delete"
onclick="deleteChild('${child.docId}')">

🗑️ حذف

</button>

</td>

</tr>

`;

});


html += `
</table>
</div>
`;

});

document.getElementById(
"allBusesContainer"
).innerHTML = html;

}

onSnapshot(
busesCollection,
(snapshot)=>{

buses = [];

snapshot.forEach(docu=>{

buses.push({
docId: docu.id,
...docu.data()
});

});

renderAllBuses();

}
);

onSnapshot(
busChildrenCollection,
(snapshot)=>{

children = [];

snapshot.forEach(docu=>{

children.push({
docId: docu.id,
...docu.data()
});

});

renderAllBuses();

}
);
</script>
